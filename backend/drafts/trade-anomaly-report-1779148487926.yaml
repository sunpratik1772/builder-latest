schema_version: '1.0'
workflow_id: copilot-1779148479
name: Trade Anomaly Report
version: '1.0'
description: Pulls trade data, identifies transactions with unusually high amounts
  as anomalies, and generates an Excel report of these anomalies.
nodes:
- id: n1
  type: manual_trigger
  label: Start Workflow
  config: {}
  position:
    x: 60
    y: 280
- id: n2
  type: csv_extract
  label: Extract Trade Data
  config:
    source: transactions.csv
  position:
    x: 320
    y: 280
- id: n3
  type: code
  label: Score Anomalies
  config:
    code: 'import pandas as pd

      df = pd.DataFrame(rows)

      # Calculate a simple anomaly threshold: mean + 2 standard deviations

      mean_amount = df[''amount''].mean()

      std_amount = df[''amount''].std()

      anomaly_threshold = mean_amount + (2 * std_amount)

      # Flag transactions where amount exceeds the threshold

      df[''is_anomaly''] = df[''amount''] > anomaly_threshold

      rows = df.to_dict(orient=''records'')'
  position:
    x: 600
    y: 280
- id: n4
  type: filter
  label: Filter Anomalies
  config:
    expression: row.is_anomaly === true
  position:
    x: 600
    y: 480
- id: n5
  type: excel_output
  label: Write Anomaly Report
  config:
    filename: trade_anomaly_report.xlsx
    tabNames:
    - Anomalous Transactions
  position:
    x: 900
    y: 380
edges:
- from: n1
  to: n2
- from: n2
  to: n3
- from: n3
  to: n4
- from: n4
  to: n5
