schema_version: '1.0'
workflow_id: copilot-1779147110
name: Trade Anomaly Detection Report
version: '1.0'
description: Pulls trade data, scores anomalies using AI, and generates an Excel report.
nodes:
- id: n1
  type: manual_trigger
  label: Start Workflow
  config: {}
  position:
    x: 60
    y: 280
- id: n2
  type: csv_extract
  label: Extract Transactions
  config:
    source: transactions.csv
  position:
    x: 320
    y: 280
- id: n3
  type: agent
  label: Score Anomalies
  config:
    prompt: You are an expert financial analyst. Your task is to identify unusual
      or potentially fraudulent transactions.
    task: Review the transaction details and assign an 'anomaly_score' from 0 (normal)
      to 10 (highly anomalous). Consider factors like amount, category, merchant,
      and type. Provide a brief 'anomaly_reason' if the score is 5 or higher.
    perRow: true
    outputColumn: anomaly_score
  position:
    x: 600
    y: 280
- id: n4
  type: excel_output
  label: Generate Anomaly Report
  config:
    filename: anomaly_report.xlsx
    tabNames:
    - Anomalies
  position:
    x: 900
    y: 280
edges:
- from: n1
  to: n2
- from: n2
  to: n3
- from: n3
  to: n4
