schema_version: '1.0'
workflow_id: copilot-1779152492
name: Trade Anomaly Detection and Reporting
version: '1.0'
description: Pulls trade data, scores anomalies using AI, and generates a report of
  anomalous transactions.
nodes:
- id: n1
  type: manual_trigger
  label: Start Workflow
  config: {}
  position:
    x: 60
    y: 280
- id: n2
  type: csv_extract
  label: Extract Trade Data
  config:
    source: transactions.csv
  position:
    x: 320
    y: 280
- id: n3
  type: agent
  label: Score Anomalies
  config:
    prompt: You are an expert financial analyst. Review the transaction details and
      assign an anomaly score from 0 (not anomalous) to 100 (highly anomalous). Return
      only the score as a number.
    task: Score the transaction for anomalies.
    perRow: true
    outputColumn: anomaly_score
    maxRows: 20
    model: gemini-pro
  position:
    x: 600
    y: 280
- id: n4
  type: filter
  label: Filter High Anomalies
  config:
    expression: row.anomaly_score > 70
  position:
    x: 600
    y: 480
- id: n5
  type: csv_output
  label: Generate Anomaly Report
  config:
    filename: anomalous_transactions_report.csv
  position:
    x: 900
    y: 480
edges:
- from: n1
  to: n2
  sourceHandle: 'true'
- from: n2
  to: n3
  sourceHandle: 'true'
- from: n3
  to: n4
  sourceHandle: 'true'
- from: n4
  to: n5
  sourceHandle: 'true'
