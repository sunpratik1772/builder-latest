type_id: ACTIVATION_TRIGGER
description: The Activation Trigger node gets triggered when an event gets fired by
  n8n or a workflow.
ui:
  display_name: Activation Trigger
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: triggers
      label: Triggers
      order: 5
      color: '#0EA5E9'
    node_order: 1
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports: []
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
- name: events
  type: array
  description: Lifecycle events to monitor.
  required: false
  default: []
- name: activationMode
  type: string
  description: Current activation mode for trigger execution.
  required: false
