type_id: EVALUATION_TRIGGER
description: Use the Evaluation Trigger node when setting up evaluations to validate
  your AI workflow reliability. During evaluation, the Evaluation Trigger node reads
  your evaluation dataset from Google Sheets, sending the items through the workflow
  one at a time, in sequence.
ui:
  display_name: Evaluation Trigger
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: triggers
      label: Triggers
      order: 5
      color: '#0EA5E9'
    node_order: 18
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports: []
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
- name: source
  type: string
  description: Dataset source for evaluation rows.
  required: false
  default: dataTable
  enum:
  - dataTable
  - googleSheets
- name: dataTableId
  type: string
  description: Data table id when source is dataTable.
  required: false
  default: evaluation_dataset
- name: limit_rows
  type: boolean
  description: Whether to limit rows processed.
  required: false
  default: false
- name: max_rows_to_process
  type: integer
  description: Maximum rows to process when limit_rows is true.
  required: false
  default: 10
- name: filter_rows
  type: boolean
  description: Whether to apply row filters.
  required: false
  default: false
- name: document_id
  type: string
  description: Spreadsheet id when source is googleSheets.
  required: false
- name: sheet_name
  type: string
  description: Sheet name when source is googleSheets.
  required: false
  default: Sheet1
- name: filters
  type: array
  description: Filters with column and value fields.
  required: false
  default: []
semantics:
  requires: []
  provides: []
