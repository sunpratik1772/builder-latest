type_id: FILTER
description: Filter items based on a condition. If the item meets the condition, the
  Filter node passes it on to the next node in the Filter node output. If the item
  doesn't meet the condition, the Filter node omits the item from its output.
ui:
  display_name: Filter
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: '#6366F1'
    node_order: 24
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: conditions
    type: object
    description: Condition tree with combinator and conditions array
    required: false
  - name: ignore_case
    type: boolean
    description: Case-insensitive comparison for strings
    required: false
    default: false
  - name: less_strict_type_validation
    type: boolean
    description: Attempt loose type coercion before compare
    required: false
    default: false
