type_id: CHAT
description: Use the Chat node with the Chat Trigger node to send messages into the
  chat and optionally wait for responses from users. This enables human-in-the-loop
  (HITL) use cases in chat workflows, allowing you to have multiple chat interactions
  within a single execution. The Chat node al
