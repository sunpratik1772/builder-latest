type_id: MERGE
description: Use the Merge node to combine data from multiple streams, once data of
  all streams is available.
ui:
  display_name: Merge
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: flow
      label: Flow Control
      order: 10
      color: '#F59E0B'
    node_order: 41
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: mode
    type: string
    description: Merge mode
    required: false
    default: append
    enum: [append, combine, choose]
  - name: combine_by
    type: string
    description: Combine strategy when mode=combine
    required: false
    default: combineByPosition
    enum: [combineByPosition, matchingFields, allPossibleCombinations]
  - name: fields_to_match
    type: array
    description: Field names used for matchingFields strategy
    required: false
  - name: output_type
    type: string
    description: Output strategy for matchingFields mode
    required: false
    default: keep_matches
    enum: [keep_matches, keep_non_matches, keep_everything, enrich_input_1, enrich_input_2]
  - name: include_any_unpaired_items
    type: boolean
    description: Keep unpaired rows in combineByPosition mode
    required: false
    default: false
  - name: output
    type: string
    description: Branch selection when mode=choose
    required: false
    default: input1
    enum: [input1, input2, single_empty_item]
semantics:
  requires: []
  provides: []
constraints:
- Generated from official n8n docs markdown via deep parser.
- 'Source: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.merge/'
extras:
  docs_slug: n8n-nodes-base.merge
  docs_url: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.merge/
  scrape_mode: deep_all_sections
