    required: false
  - name: destinationFieldName
    type: string
    description: CamelCase alias for destination_field_name
    required: false
  - name: include_binary
    type: boolean
    description: Include binary payload from source item
    required: false
    default: false
  - name: includeBinary
    type: boolean
    description: CamelCase alias for include_binary
    required: false
