    type: string
    description: Field containing list to split into items
    required: true
  - name: fieldToSplitOut
    type: string
    description: CamelCase alias for field_to_split_out
    required: false
  - name: include
    type: string
    description: Which non-split fields to include in each output item
    required: false
    default: noOtherFields
    enum: [noOtherFields, allOtherFields, selectedOtherFields]
