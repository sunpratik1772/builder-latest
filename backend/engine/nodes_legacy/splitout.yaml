type_id: SPLIT_OUT
description: Use the Split Out node to separate a single data item containing a list
  into multiple items. For example, a list of customers, and you want to split them
  so that you have an item for each customer.
ui:
  display_name: Split Out
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: flow
      label: Flow Control
      order: 10
      color: '#F59E0B'
    node_order: 57
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
