type_id: DB_SOLR_CONNECTOR
description: Query SQLite Solr-style surveillance tables.
ui:
  display_name: db_solr_connector
  color: "#10B981"
  icon: Database
  palette:
    section:
      id: integration
      label: Integration
      order: 30
      color: "#10B981"
    node_order: 1
input_ports: []
output_ports:
  - name: output
    type: object
    description: Queried rows
params:
  - name: table
    type: string
    description: Core table to query
    enum: [hs_alerts, hs_orders, hs_exec, hs_trades]
    default: hs_alerts
    required: true
  - name: output_name
    type: string
    description: Dataset name stored in run context
    default: hs_alerts
    required: false
  - name: output_columns
    type: string_list
    widget: chips
    description: Columns to output from the selected table. Leave empty for all schema columns.
    required: false
  - name: db_path
    type: string
    description: Optional SQLite database path
    required: false
  - name: alert_id
    type: string
    description: Optional alert id override
    required: false
  - name: trader_id
    type: string
    description: Optional trader id override from alert payload
    required: false
  - name: trader_name
    type: string
    description: Optional trader name override from alert payload
    required: false
  - name: keyword
    type: string
    description: Optional keyword override
    required: false
  - name: currency_pair
    type: string
    description: Optional currency pair override from alert payload
    required: false
  - name: date
    type: string
    description: Optional alert date override
    required: false
  - name: start_time
    type: string
    description: Optional start timestamp from alert payload
    required: false
  - name: end_time
    type: string
    description: Optional end timestamp from alert payload
    required: false
  - name: limit
    type: integer
    description: Optional maximum number of rows to return
    default: 0
    required: false
semantics:
  requires: []
  provides: []
constraints:
  - Reads only hs_alerts, hs_orders, hs_exec, and hs_trades from the SQLite fixture. Alert selection uses alert id / keyword / date — not participant scope (use MARKET_API_CONNECTOR comms for participant filters).
