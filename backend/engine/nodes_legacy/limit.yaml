type_id: LIMIT
description: Use the Limit node to remove items beyond a defined maximum number. You
  can choose whether n8n takes the items from the beginning or end of the input data.
ui:
  display_name: Limit
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: '#6366F1'
    node_order: 34
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: max_items
    type: integer
    description: Maximum number of items to keep
    required: false
    default: 1
  - name: keep
    type: string
    description: Keep from beginning or end
    required: false
    default: first_items
    enum: [first_items, last_items]
