type_id: SET
description: Use the Edit Fields node to set workflow data. This node can set new
  data as well as overwrite data that already exists. This node is crucial in workflows
  which expect incoming data from previous nodes, such as when inserting values to
  Google Sheets or databases.
ui:
  display_name: Edit Fields (Set)
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: '#6366F1'
    node_order: 13
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: assignments
    type: object
    description: Manual assignments object (assignments.assignments[])
    required: false
  - name: fields
    type: array
    description: Legacy assignment list
    required: false
  - name: json_output
    type: object
    description: JSON output object merged into each item
    required: false
  - name: keep_only_set_fields
    type: boolean
    description: Keep only fields assigned by this node
    required: false
    default: false
  - name: support_dot_notation
    type: boolean
    description: Treat dotted names as nested object paths
    required: false
    default: true
semantics:
  requires: []
  provides: []
