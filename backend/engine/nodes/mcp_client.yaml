type_id: MCP_CLIENT
description: The MCP Client node is a Model Context Protocol (MCP) client that allows
  you to use the tools that are exposed by an external MCP server.
ui:
  display_name: MCP Client
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: io
      label: I/O and Integrations
      order: 20
      color: '#10B981'
    node_order: 39
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
- name: serverTransport
  type: string
  description: Transport protocol for MCP server endpoint.
  required: false
  default: httpStreamable
  enum: [sse, httpStreamable]
- name: endpointUrl
  type: string
  description: External MCP endpoint URL.
  required: false
- name: authentication
  type: string
  description: Authentication mode for MCP endpoint.
  required: false
  default: none
  enum: [none, bearerAuth, headerAuth, mcpOAuth2Api, multipleHeadersAuth]
- name: tool
  type: string
  description: Tool identifier to invoke.
  required: false
- name: input_mode
  type: string
  description: Tool argument mapping mode.
  required: false
  default: manual
  enum: [manual, json]
- name: parameters
  type: object
  description: Manual parameter mapping payload.
  required: false
  default: {}
- name: jsonInput
  type: object
  description: JSON argument object when inputMode=json.
  required: false
  default: {}
- name: options
  type: object
  description: Additional MCP client options.
  required: false
  default: {}
- name: convert_to_binary
  type: boolean
  description: Convert image/audio tool content to binary bytes.
  required: false
  default: true
- name: timeout
  type: integer
  description: Timeout in milliseconds.
  required: false
  default: 60000
semantics:
  requires: []
  provides: []
