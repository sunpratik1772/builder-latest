input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: action
    type: string
    description: Crypto action
    required: false
    default: hash
    enum: [generate, hash, hmac, sign]
  - name: value
    type: string
    description: Source value for hash/hmac/sign
    required: false
  - name: dataPropertyName
    type: string
    description: Destination property for output
    required: false
    default: data
