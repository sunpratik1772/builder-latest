type_id: CRYPTO
description: Use the Crypto node to encrypt data in workflows.
ui:
  display_name: Crypto
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: '#6366F1'
    node_order: 9
  config_tags:
  - n8n
  - docs-derived
