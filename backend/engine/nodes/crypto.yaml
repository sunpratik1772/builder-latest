    type: string
    description: Random generation encoding type
    required: false
    default: uuid
    enum: [uuid, ascii, base64, hex]
  - name: stringLength
    type: integer
    description: Random string length for non-uuid generation
    required: false
    default: 32
  - name: secret
    type: string
    description: Secret for hmac/sign actions
    required: false
