type_id: CONVERT_TO_FILE
description: Use the Convert to File node to take input data and output it as a file.
  This converts the input JSON data into a binary format.
ui:
  display_name: Convert to File
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: '#6366F1'
    node_order: 8
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
- name: operation
  type: string
  description: Output conversion operation.
  required: false
  default: csv
  constraints:
    enum: [csv, html, toJson, toText, toBinary, ods, rtf, xls, xlsx, iCal]
- name: put_output_file_in_field
  type: string
  description: Output field to hold generated bytes.
  required: false
  default: data
- name: file_name
  type: string
  description: Output base file name.
  required: false
  default: output
- name: text
  type: string
  description: Text payload for toText operation.
  required: false
- name: input_field
  type: string
  description: Input field containing base64 data for toBinary.
  required: false
  default: data
semantics:
  requires: []
  provides: []
constraints:
- Generated from official n8n docs markdown via deep parser.
- 'Source: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.converttofile/'
extras:
  docs_slug: n8n-nodes-base.converttofile
  docs_url: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.converttofile/
  scrape_mode: deep_all_sections
