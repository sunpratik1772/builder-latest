type_id: mcp
description: Call an MCP integration tool. Pick a server preset, paste tokens in the inspector, then run.
ui:
  display_name: MCP Tool
  icon: Cpu
  color: "#0f766e"
  palette: { section: { id: integrations } }
input_ports: [{ name: rows, type: dataframe, optional: true }]
output_ports: [{ name: rows, type: dataframe }]
params:
  - name: integration
    type: enum
    required: true
    default: studio_bridge
    widget: select
    description: MCP server preset (Hermes/OpenClaw-compatible integrations).
    enum: [studio_bridge, atlassian, github]
  - name: serverUrl
    type: string
    required: false
    widget: text
    description: Optional bridge URL override (default http://127.0.0.1:8765 or MCP_SERVER_URL).
    visible_if: { integration: studio_bridge }
  - name: atlassianSiteUrl
    type: string
    required: false
    placeholder: "https://yourco.atlassian.net"
    description: Atlassian Cloud site URL.
    visible_if: { integration: atlassian }
  - name: atlassianEmail
    type: string
    required: false
    placeholder: "you@company.com"
    description: Atlassian account email (API token auth).
    visible_if: { integration: atlassian }
  - name: atlassianApiToken
    type: string
    required: false
    widget: password
    description: Atlassian API token (paste here or set ATLASSIAN_API_TOKEN in .env).
    visible_if: { integration: atlassian }
  - name: confluenceSpaceKey
    type: string
    required: false
    placeholder: "ENG"
    description: Confluence space key for new pages.
    visible_if: { integration: atlassian }
  - name: jiraProjectKey
    type: string
    required: false
    placeholder: "DEMO"
    description: Jira project key for new issues.
    visible_if: { integration: atlassian }
  - name: githubToken
    type: string
    required: false
    widget: password
    description: GitHub PAT (paste here or set GITHUB_TOKEN in .env).
    visible_if: { integration: github }
  - name: githubRepo
    type: string
    required: false
    placeholder: "owner/repo"
    description: Target repository for pushes and PRs.
    visible_if: { integration: github }
  - name: tool
    type: enum
    required: true
    widget: select
    description: Tool to invoke on the selected integration.
    enum:
      - confluence_search_pages
      - confluence_extract_action_items
      - tasks_bulk_create
      - jira_create_issue
      - jira_list_issues
      - github_implement_fixes
      - confluence_publish_report
      - studio_publish_architecture_doc
      - jira_create_epics_from_confluence
      - github_fix_jira_and_update
  - name: params
    type: json
    required: false
    widget: json_editor
    description: Tool arguments (JSON). Upstream rows are passed as params.data automatically.
