type_id: WAIT
description: Use the Wait node pause your workflow's execution. When the workflow
  pauses it offloads the execution data to the database. When the resume condition
  is met, the workflow reloads the data and the execution continues.
ui:
  display_name: Wait
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: flow
      label: Flow Control
      order: 10
      color: '#F59E0B'
    node_order: 64
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: resume
    type: string
    description: Wait resume mode
    required: false
    default: timeInterval
    enum: [timeInterval, specificTime, webhook, form]
  - name: amount
    type: number
    description: Wait amount for timeInterval mode
    required: false
    default: 1
  - name: unit
    type: string
    description: Wait unit for timeInterval mode
    required: false
    default: seconds
    enum: [seconds, minutes, hours, days]
  - name: dateTime
    type: string
    description: ISO datetime for specificTime mode
    required: false
  - name: limitWaitTime
    type: boolean
    description: Whether webhook/form wait has a timeout limit.
    required: false
    default: false
  - name: limitType
    type: string
    description: Limit strategy for webhook/form wait timeout.
    required: false
    default: afterTimeInterval
    enum: [afterTimeInterval, atSpecifiedTime]
  - name: resumeAmount
    type: number
    description: Timeout amount when limitType is afterTimeInterval.
    required: false
    default: 1
  - name: resumeUnit
    type: string
    description: Timeout unit when limitType is afterTimeInterval.
    required: false
    default: hours
    enum: [seconds, minutes, hours, days]
  - name: maxDateAndTime
    type: string
    description: Timeout datetime when limitType is atSpecifiedTime.
    required: false
  - name: httpMethod
    type: string
    description: Webhook HTTP method for resume=webhook.
    required: false
    default: GET
    enum: [GET, POST, PUT, PATCH, DELETE, HEAD]
  - name: authentication
    type: string
    description: Authentication mode for resume webhook.
    required: false
    default: none
    enum: [none, basicAuth, headerAuth, jwtAuth]
  - name: responseCode
    type: integer
    description: Response status code for resume webhook.
    required: false
    default: 200
  - name: responseMode
    type: string
    description: Response handling mode for resume webhook.
    required: false
    default: onReceived
    enum: [onReceived, lastNode, responseNode]
  - name: options
    type: object
    description: Extra webhook/form options such as webhookSuffix and response settings.
    required: false
    default: {}
  - name: webhook_payload
    type: object
    description: Payload emitted when resume=webhook
    required: false
  - name: form_payload
    type: object
    description: Payload emitted when resume=form
    required: false
semantics:
  requires: []
  provides: []
