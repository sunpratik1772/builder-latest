type_id: CODE
description: Use the Code node to write custom JavaScript or Python and run it as
  a step in your workflow.
ui:
  display_name: Code
  color: '#6B7280'
  icon: Box
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: '#6366F1'
    node_order: 4
  config_tags:
  - n8n
  - docs-derived
  - deep-research
input_ports:
- name: input
  type: object
  description: Input items
  optional: false
output_ports:
- name: output
  type: object
  description: Output items
  optional: false
params:
  - name: mode
    type: string
    description: Execution mode
    required: false
    default: runOnceForAllItems
    enum: [runOnceForAllItems, runOnceForEachItem]
  - name: language
    type: string
    description: Code language
    required: false
    default: javaScript
    enum: [javaScript, pythonNative]
  - name: jsCode
    type: string
    description: "JavaScript code (supports py: prefix bridge)"
    required: false
  - name: pythonCode
    type: string
    description: Python code
    required: false
semantics:
  requires: []
  provides: []
constraints:
- Generated from official n8n docs markdown via deep parser.
- 'Source: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.code/'
extras:
  docs_slug: n8n-nodes-base.code
  docs_url: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.code/
  scrape_mode: deep_all_sections
