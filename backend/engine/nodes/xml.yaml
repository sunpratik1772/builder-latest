type_id: XML
description: "Parse and manipulate XML data"

ui:
  color: "#F59E0B"
  icon: Code
  palette:
    section:
      id: transform
      label: Transform
      order: 20
      color: "#A78BFA"
    node_order: 19

input_ports:
  - name: input
    type: object
    description: "Items to process"
    optional: false

output_ports:
  - name: output
    type: object
    description: "Processed XML data"

params:
  - name: operation
    type: string
    description: "XML operation"
    enum: [parse, stringify, extract]
    default: parse
    required: true
    
  - name: field_name
    type: string
    description: "Field containing XML string"
    required: false
    
  - name: xpath
    type: string
    description: "XPath to extract"
    required: false

semantics:
  requires: []
  provides: []

constraints:
  - "parse converts XML strings to objects"
  - "stringify converts objects to XML strings"
  - "extract pulls specific values using XPath"