type_id: JSON
description: "Parse and manipulate JSON data"

ui:
  color: "#F59E0B"
  icon: Braces
  palette:
    section:
      id: transform
      label: Transform
      order: 15
      color: "#6366F1"
    node_order: 18

input_ports:
  - name: input
    type: object
    description: "Items to process"
    optional: false

output_ports:
  - name: output
    type: object
    description: "Processed JSON data"

params:
  - name: operation
    type: string
    description: "JSON operation"
    enum: [parse, stringify, extract]
    default: parse
    required: true
    
  - name: field_name
    type: string
    description: "Field containing JSON string (for parse)"
    required: false
    
  - name: json_path
    type: string
    description: "Path to extract (dot notation)"
    required: false

semantics:
  requires: []
  provides: []

constraints:
  - "parse converts JSON strings to objects"
  - "stringify converts objects to JSON strings"
  - "extract pulls specific values from JSON"
